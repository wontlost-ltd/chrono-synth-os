name: Perf

on:
  # 每周日 03:00 UTC（北京时间周日 11:00）跑 ramp profile
  schedule:
    - cron: '0 3 * * 0'
  # 手动触发：可以选 scenario，也可以指定单个脚本
  workflow_dispatch:
    inputs:
      scenario:
        description: 'k6 scenario (smoke / ramp / soak / contention / burst)'
        required: false
        default: 'ramp'
        type: choice
        options: [smoke, ramp, soak, contention, burst]
      script:
        description: 'Which suite to run (all / conversation / agent-tool / portability-export)'
        required: false
        default: 'all'
        type: choice
        options: [all, conversation, agent-tool, portability-export]
  # PR 上跑 smoke profile，作为 fast feedback；不阻塞合并（持续 ≤ 90s）
  pull_request:
    branches: [main]
    paths:
      - 'perf/**'
      - '.github/workflows/perf.yml'

permissions:
  contents: read

jobs:
  perf:
    runs-on: ubuntu-latest
    # weekly 跑 30 分钟 + 一些 buffer；手动可调；smoke ≤ 5 分钟
    timeout-minutes: 50

    # 默认 sqlite in-memory：perf-smoke 只关心 HTTP 层 / 应用栈开销，不卷
    # 入 DB I/O。Postgres 路径有自己的 test-postgres workflow（CI）覆盖。
    # 如需用 postgres 跑容量回归，dispatch 时设 USE_POSTGRES=true（占位，未实现）。
    services:
      redis:
        image: redis:8-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      # PR 跑 smoke；schedule + dispatch 用 inputs.scenario 或默认 ramp
      K6_SCENARIO: ${{ github.event.inputs.scenario || (github.event_name == 'pull_request' && 'smoke' || 'ramp') }}
      RUN_SCRIPT: ${{ github.event.inputs.script || 'all' }}
      # 测试 fixture 用的 personaId 列表；不强制存在——脚本随机挑选，
      # 服务端 404 会被 check 捕获并影响 SLO 阈值，由开发者排查。
      PERSONA_IDS: 'perf-persona-1,perf-persona-2,perf-persona-3,perf-persona-4,perf-persona-5'
      # 后端启动：sqlite 内存模式 + redis container；不需要 postgres
      CHRONO_DB_DRIVER: sqlite
      CHRONO_DB_PATH: ':memory:'
      REDIS_URL: redis://localhost:6379
      CHRONO_AUTH_ENABLED: 'true'
      # 这两个仅 perf-runner 使用；不要复用生产或集成环境的 secret
      CHRONO_AUTH_API_KEYS: ${{ secrets.PERF_API_KEYS || 'perf-api-key-do-not-use-in-prod' }}
      PERF_BEARER_TOKEN: ${{ secrets.PERF_BEARER_TOKEN || '' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npx tsc -b packages/contracts/tsconfig.json packages/kernel/tsconfig.json packages/data-plane/tsconfig.json packages/sync-engine/tsconfig.json packages/design-tokens/tsconfig.json packages/adapter-web/tsconfig.json packages/adapter-tauri/tsconfig.json packages/adapter-react-native/tsconfig.json
          npx tsc -b tsconfig.src.json
          npm run build

      - name: Install k6
        run: |
          set -euo pipefail
          K6_VERSION=v0.55.2
          curl -fsSL "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz" \
            | tar -xz -C /tmp
          sudo install -m 0755 "/tmp/k6-${K6_VERSION}-linux-amd64/k6" /usr/local/bin/k6
          k6 version

      - name: Validate script syntax (k6 inspect)
        # k6 inspect runs the init context (so fail() guards trip), and k6
        # only exposes vars passed via --env, not the runner's OS env. We
        # inject stub values here purely to satisfy the auth-presence
        # guards; the actual run steps below pass the real CI values.
        run: |
          set -euo pipefail
          for f in perf/k6-*.js; do
            k6 inspect \
              --env BEARER_TOKEN=stub-for-inspect-only \
              --env API_KEY=stub-for-inspect-only \
              "$f" > /dev/null
          done

      - name: Start backend
        run: |
          set -euo pipefail
          mkdir -p perf-results perf-logs
          npm run start > perf-logs/backend.log 2>&1 &
          echo $! > perf-logs/backend.pid
          # 探活：最多等 60 秒
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/healthz > /dev/null 2>&1; then
              echo "backend healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "backend did not become healthy within 60s; tail of log:"
          tail -100 perf-logs/backend.log
          exit 1

      - name: Run conversation perf
        if: env.RUN_SCRIPT == 'all' || env.RUN_SCRIPT == 'conversation'
        env:
          BASE_URL: http://localhost:3000
          API_KEY: ${{ env.CHRONO_AUTH_API_KEYS }}
        run: k6 run perf/k6-conversation.js

      - name: Run agent-tool perf
        if: env.RUN_SCRIPT == 'all' || env.RUN_SCRIPT == 'agent-tool'
        env:
          BASE_URL: http://localhost:3000
          BEARER_TOKEN: ${{ env.PERF_BEARER_TOKEN }}
        # PERF_BEARER_TOKEN secret 缺失时跳过这一步并 warn，不让整条流水线 fail
        run: |
          if [ -z "${BEARER_TOKEN:-}" ]; then
            echo "::warning::Skipping agent-tool perf — PERF_BEARER_TOKEN secret not set"
            exit 0
          fi
          k6 run perf/k6-agent-tool.js

      - name: Run portability-export perf
        if: env.RUN_SCRIPT == 'all' || env.RUN_SCRIPT == 'portability-export'
        env:
          BASE_URL: http://localhost:3000
          BEARER_TOKEN: ${{ env.PERF_BEARER_TOKEN }}
        run: |
          if [ -z "${BEARER_TOKEN:-}" ]; then
            echo "::warning::Skipping portability-export perf — PERF_BEARER_TOKEN secret not set"
            exit 0
          fi
          k6 run perf/k6-portability-export.js

      - name: Stop backend
        if: always()
        run: |
          if [ -f perf-logs/backend.pid ]; then
            kill "$(cat perf-logs/backend.pid)" || true
          fi

      - name: Upload perf results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ env.K6_SCENARIO }}-${{ github.run_id }}
          path: |
            perf-results/
            perf-logs/
          retention-days: 30
          if-no-files-found: warn
