name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: ${{ vars.CI_RUNNER_LABELS && '' || 'npm' }}

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/wontlost-ltd/chrono-synth-os
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/wontlost-ltd/chrono-synth-os:${{ steps.meta.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

  dispatch-deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'wontlost-ltd',
              repo: 'chrono-synth-deploy',
              event_type: 'chrono-os-released',
              client_payload: {
                version: '${{ needs.build-and-push.outputs.image-tag }}',
                sha: '${{ github.sha }}',
                ref: '${{ github.ref_name }}',
                actor: '${{ github.actor }}'
              }
            });
