name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'           # GA: v2.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'         # pre-release: v2.0.0-beta.1 / -rc.2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 60min：多架构下 arm64 层在 amd64 runner 上经 QEMU 模拟构建（npm ci + 全包 tsc），冷缓存时
    # 比单 amd64 慢得多，30min 偏紧（Codex 交叉审查的发布稳定性建议）。
    timeout-minutes: 60
    permissions:
      # contents: read   — checkout the source
      # packages: write  — push to ghcr.io
      # id-token: write  — required for cosign keyless OIDC signing (sigstore)
      # attestations: write — write SLSA build provenance attestations
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - run: npm ci

      # Mirror ci.yml's pre-build order: workspace packages must be built
      # before src/ can typecheck (they're consumed via `@chrono/kernel` etc.).
      # Without this, npm run typecheck fails immediately with TS2307
      # "Cannot find module '@chrono/kernel'".
      - name: Build core packages
        run: npx tsc -b packages/contracts/tsconfig.json packages/kernel/tsconfig.json packages/data-plane/tsconfig.json packages/sync-engine/tsconfig.json packages/design-tokens/tsconfig.json packages/schema-dsl/tsconfig.json packages/adapter-web/tsconfig.json packages/adapter-tauri/tsconfig.json packages/adapter-react-native/tsconfig.json
      - name: Build main source
        run: npx tsc -b tsconfig.src.json

      - run: npm run build
      - run: npm run typecheck
      - run: npm run test

      # 多架构构建：amd64（生产/CI 原生）+ arm64（Apple Silicon 开发机 / AWS Graviton 等 ARM 云）。
      # amd64 runner 交叉构建 arm64 层需 QEMU 模拟器（setup-qemu 注册 binfmt handler）。
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pre-release tags (v2.0.0-beta.1) only emit the full version tag —
      # we do NOT want them to claim `latest` or `2.0` aliases that GA
      # tags own. docker/metadata-action's semver patterns honour SemVer
      # pre-release semantics when given `enable=false` on the major.minor
      # alias for pre-releases.
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/wontlost-ltd/chrono-synth-os
          flavor: |
            latest=${{ !contains(github.ref_name, '-') }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=sha,prefix=sha-

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # 多架构 manifest list（amd64 + arm64）。digest 输出是 **index（manifest list）digest**，
          # 下游 cosign sign / SBOM / SLSA attest 都按此 index digest 进行——签名/证明覆盖整个多架构镜像，
          # Kyverno require-image-signature 验的也是该 index digest，无需逐架构签。
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # provenance: true writes build attestation to the registry (SLSA build L3).
          # sbom: true writes the SBOM attestation alongside the image.
          provenance: true
          sbom: true

      # Trivy gating policy:
      #   - GA tag (v2.0.0): block on CRITICAL+HIGH — production must be clean.
      #   - Pre-release tag (v2.0.0-beta.X): block on CRITICAL only — beta is
      #     for finding issues; HIGH findings get reviewed during dogfooding
      #     rather than block the build outright.
      # 多架构镜像须**逐架构扫描**：两架构含**架构相关 native 二进制**（如 @node-rs/argon2 的
      # -linux-arm64-musl vs -linux-x64-musl），漏洞面**不一致**——只扫 amd64 会让 arm64-specific
      # artifact 漏过发布 gate（Codex 交叉审查）。故 amd64 与 arm64 各扫一遍，同样 blocking。
      # TRIVY_PLATFORM 在 manifest list tag 上钉具体平台（trivy-action 把 TRIVY_* env 透传给 trivy 本体）。
      - name: Trivy image scan (amd64)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          image-ref: ghcr.io/wontlost-ltd/chrono-synth-os:${{ steps.meta.outputs.version }}
          format: table
          exit-code: '1'
          severity: ${{ contains(github.ref_name, '-') && 'CRITICAL' || 'CRITICAL,HIGH' }}

      - name: Trivy image scan (arm64)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ghcr.io/wontlost-ltd/chrono-synth-os:${{ steps.meta.outputs.version }}
          format: table
          exit-code: '1'
          severity: ${{ contains(github.ref_name, '-') && 'CRITICAL' || 'CRITICAL,HIGH' }}

      # ── P1-D: cosign keyless image signing ──
      #
      # Why keyless: GH OIDC + Fulvio short-lived certs avoid the need to
      # provision and rotate long-lived private keys. The Kyverno policy
      # `require-image-signature` in chrono-synth-deploy expects the
      # certificate identity to match the workflow URL — see policy spec
      # `subjectRegExp`. If we ever switch to keyed mode we'd add the public
      # key as a ConfigMap and update Kyverno accordingly.
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          # Sign by digest, not by tag — tags are mutable, digests aren't.
          # `${{ steps.build.outputs.digest }}` is the immutable sha256:... from
          # the registry, returned by docker/build-push-action@v7.
          cosign sign --yes \
            ghcr.io/wontlost-ltd/chrono-synth-os@${{ steps.build.outputs.digest }}

      # ── SBOM attestation ──
      #
      # Generate the SBOM with anchore/sbom-action (already used by security.yml)
      # then attach it to the image as a cosign attestation. Downstream
      # verifiers can run `cosign verify-attestation --type spdxjson ...`
      # to retrieve and pin the SBOM that was current at release time.
      - name: Generate SBOM (SPDX-JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/wontlost-ltd/chrono-synth-os@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM to image
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            ghcr.io/wontlost-ltd/chrono-synth-os@${{ steps.build.outputs.digest }}

      # ── SLSA build provenance attestation ──
      #
      # GitHub-native attestation: the GH attestations API records that
      # `ghcr.io/wontlost-ltd/chrono-synth-os@sha256:...` was built by
      # *this* workflow run, signed by Fulcio under the GH identity. Verifiable
      # with `gh attestation verify` or `cosign verify-attestation`.
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/wontlost-ltd/chrono-synth-os
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: chrono-synth-os-sbom-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 90

  # Auto-trigger downstream deploy for GA tags only. Pre-release tags
  # (v2.0.0-beta.1) are explicitly internal-beta and operators promote
  # them manually after dogfooding clears the checklist.
  dispatch-deploy:
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'wontlost-ltd',
              repo: 'chrono-synth-deploy',
              event_type: 'chrono-os-released',
              client_payload: {
                version: '${{ needs.build-and-push.outputs.image-tag }}',
                sha: '${{ github.sha }}',
                ref: '${{ github.ref_name }}',
                actor: '${{ github.actor }}'
              }
            });
