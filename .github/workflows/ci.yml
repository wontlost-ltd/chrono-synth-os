name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test
      - name: Security audit
        run: npm audit --audit-level=high

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: chrono-synth-os:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: chrono-synth-os:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

  test-postgres:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: chrono_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run PostgreSQL integration tests
        run: npm run test:integration
        env:
          TEST_POSTGRES_URL: postgres://test:test@localhost:5432/chrono_test
          CHRONO_DB_DRIVER: postgres
          CHRONO_DB_CONNECTION_STRING: postgres://test:test@localhost:5432/chrono_test
