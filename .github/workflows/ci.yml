name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ vars.CI_RUNNER_LABELS && fromJSON(vars.CI_RUNNER_LABELS) || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - name: Build core packages
        run: npx tsc -b packages/contracts/tsconfig.json packages/kernel/tsconfig.json packages/data-plane/tsconfig.json packages/sync-engine/tsconfig.json packages/design-tokens/tsconfig.json packages/adapter-web/tsconfig.json packages/adapter-tauri/tsconfig.json packages/adapter-react-native/tsconfig.json
      - name: Build main source
        run: npx tsc -b tsconfig.src.json
      - run: npm run build
      - run: npm run typecheck
      - run: npm run test
      - run: npm run test:ops
      - name: Security audit
        run: npm audit --audit-level=high

  contract-and-kernel:
    runs-on: ${{ vars.CI_RUNNER_LABELS && fromJSON(vars.CI_RUNNER_LABELS) || 'ubuntu-latest' }}
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - name: Build core packages
        run: npx tsc -b packages/contracts/tsconfig.json packages/kernel/tsconfig.json packages/data-plane/tsconfig.json packages/sync-engine/tsconfig.json packages/design-tokens/tsconfig.json packages/adapter-web/tsconfig.json packages/adapter-tauri/tsconfig.json packages/adapter-react-native/tsconfig.json
      - name: Build main source
        run: npx tsc -b tsconfig.src.json
      - run: npm run build
      - name: Package tests (kernel / data-plane / contracts / sync-engine)
        run: npm run test:packages
      - name: Contract tests
        run: npm run test:contract
      - name: Kernel purity — forbidden imports
        run: npm run check:forbidden-imports

  # Pinned to GitHub-hosted Ubuntu: docker/setup-buildx-action requires
  # buildkit, which isn't available on a macOS self-hosted runner (only
  # podman, which doesn't speak the buildkit gRPC protocol the action uses).
  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: chrono-synth-os:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: chrono-synth-os:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

  # Pinned to GitHub-hosted Ubuntu: workflow `services:` blocks are a
  # Linux-only Actions feature (the runner orchestrates them via Docker).
  # macOS runners don't support services and would skip the postgres
  # container entirely, leading to confusing connection refused errors.
  test-postgres:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        # pgvector/pgvector:pg17 = vanilla Postgres 17 + the `vector`
        # extension preinstalled (and pre-allowed). The plain
        # `postgres:17-alpine` image doesn't ship the .so, so v071's
        # `CREATE EXTENSION vector` fails with "not available".
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: chrono_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - name: Build core packages
        run: npx tsc -b packages/contracts/tsconfig.json packages/kernel/tsconfig.json packages/data-plane/tsconfig.json packages/sync-engine/tsconfig.json packages/design-tokens/tsconfig.json packages/adapter-web/tsconfig.json packages/adapter-tauri/tsconfig.json packages/adapter-react-native/tsconfig.json
      - name: Build main source
        run: npx tsc -b tsconfig.src.json
      - run: npm run build
      - name: Run PostgreSQL integration tests
        run: npm run test:integration
        env:
          TEST_POSTGRES_URL: postgres://test:test@localhost:5432/chrono_test
          CHRONO_DB_DRIVER: postgres
          CHRONO_DB_CONNECTION_STRING: postgres://test:test@localhost:5432/chrono_test
