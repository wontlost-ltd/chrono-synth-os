name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Sunday 04:00 UTC for drift detection on supply-chain CVEs
    - cron: '0 4 * * 0'

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 不上传 GitHub Code Scanning（仓库未启用 Advanced Security）。
    # SARIF 仅作为 artifact 保留，开发者可在 Actions 页下载查看。
    # 若未来开启 Advanced Security，把 upload 改回 true 即可。
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # Use security-and-quality query suite to gate HIGH+ findings
          queries: security-and-quality
          config: |
            paths-ignore:
              - dist
              - dist-test
              - '**/*.test.ts'
              - '**/*.test.tsx'
      - uses: github/codeql-action/analyze@v4
        id: analyze
        with:
          category: '/language:javascript-typescript'
          # 关闭 SARIF Code Scanning 上传：仓库未购买 Advanced Security
          upload: never
          # SARIF 输出目录；后续 upload-artifact 步骤打包成工件
          output: sarif-results
          # 同时关闭 CodeQL database 上传。这一步独立于 SARIF；没有 GHAS
          # 的仓库会触发 4 次重试后报 warning，污染日志。
          # 输入定义见 github/codeql-action src/database-upload.ts。
          upload-database: false
      # SARIF severity gate — fail CI on HIGH/CRITICAL CodeQL findings.
      # Without Advanced Security, SARIF is artifact-only by default; this step
      # replaces what GitHub Code Scanning would otherwise gate. See
      # `.claude/runbooks/p0-a-acceptance.md` for context.
      #
      # SARIF v2.1.0 structure (per CodeQL output):
      #   security-severity lives on rule metadata:
      #     runs[].tool.driver.rules[].properties["security-severity"]
      #   results reference the rule via ruleId or ruleIndex.
      # This step joins each result to its rule, reads the rule's severity,
      # and gates HIGH+ (≥ 7.0 on the CVSS-aligned 0-10 scale).
      #
      # severity scale (CodeQL convention):
      #   9.0-10.0 critical, 7.0-8.9 high, 4.0-6.9 medium, 0.1-3.9 low.
      # Findings whose rule has no security-severity (quality queries etc.) are skipped.
      - name: SARIF severity gate (HIGH+ blocks merge)
        run: |
          set -euo pipefail
          shopt -s nullglob
          SARIF_FILES=(sarif-results/*.sarif)
          if [ ${#SARIF_FILES[@]} -eq 0 ]; then
            echo "::error::No SARIF output found at sarif-results/*.sarif"
            exit 1
          fi
          # Build [run -> ruleId -> severity] lookup then join with results.
          # Per SARIF spec, a result identifies its rule via either:
          #   - .ruleId (string)
          #   - .ruleIndex (integer index into run.tool.driver.rules[])
          # We handle both. If a rule has no security-severity property the
          # finding is excluded from the gate.
          FILTER='
            [ .[]
              | (.runs // [])[]
              | . as $run
              | ($run.tool.driver.rules // []) as $rules
              | ($run.results // [])[]
              | . as $r
              | ( if   $r.ruleIndex != null then $rules[$r.ruleIndex]
                  elif $r.ruleId    != null then ($rules[] | select(.id == $r.ruleId) | . )
                  else null end
                ) as $rule
              | ($rule.properties["security-severity"] // null) as $sev_str
              | select($sev_str != null)
              | ($sev_str | tonumber) as $sev
              | select($sev >= 7.0)
              | { ruleId: ($r.ruleId // $rule.id // "unknown"),
                  severity: $sev,
                  file: ($r.locations[0].physicalLocation.artifactLocation.uri // "n/a"),
                  message: ($r.message.text // "") }
            ]
          '
          jq -s "$FILTER" "${SARIF_FILES[@]}" > codeql-high-plus.json
          HIGH_PLUS=$(jq 'length' codeql-high-plus.json)
          echo "CodeQL HIGH+ findings: ${HIGH_PLUS}"
          jq '.' codeql-high-plus.json
          if [ "${HIGH_PLUS}" -gt 0 ]; then
            echo "::error::CodeQL gate failed: ${HIGH_PLUS} HIGH/CRITICAL finding(s). See codeql-high-plus-${{ github.sha }} artifact."
            exit 1
          fi
      - name: Upload CodeQL severity gate output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codeql-high-plus-${{ github.sha }}
          path: codeql-high-plus.json
          retention-days: 30
          if-no-files-found: warn
      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codeql-sarif-${{ github.sha }}
          path: sarif-results/
          retention-days: 30
          if-no-files-found: error

  # Pinned to GitHub-hosted Ubuntu: trufflesecurity/trufflehog runs via
  # `docker run`, and our macOS self-hosted runner uses podman without a
  # `docker` CLI shim. Could be unblocked by installing `docker` CLI to alias
  # podman, but trufflehog is light enough (~10s) that it's not worth the
  # maintenance cost.
  #
  # Action pinned to a release tag (not @main) per P0-A supply-chain hardening.
  # Bump via dependabot or manual review of trufflehog changelogs. Bumped
  # 2026-05-21 to v3.95.3.
  secrets-scan:
    name: Secrets scan (trufflehog)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: TruffleHog filesystem scan
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          path: ./
          extra_args: --results=verified,unknown

  license-check:
    name: Dependency license allowlist
    runs-on: ${{ vars.CI_RUNNER_LABELS && fromJSON(vars.CI_RUNNER_LABELS) || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: npm ci --ignore-scripts
      - name: Install license-checker
        run: npm install -g license-checker-rseidelsohn@^4
      - name: Run allowlist check
        run: |
          # Production deps only; reject GPL-3 / AGPL family
          npx --yes license-checker-rseidelsohn \
            --production \
            --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense;MPL-2.0;Python-2.0;BlueOak-1.0.0;CC-BY-4.0;CC-BY-3.0' \
            --excludePackages 'chrono-synth-os@2.0.0' \
            --summary

  sbom:
    name: SBOM (SPDX)
    runs-on: ${{ vars.CI_RUNNER_LABELS && fromJSON(vars.CI_RUNNER_LABELS) || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: npm ci --ignore-scripts
      - uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: chrono-synth-os-sbom-${{ github.sha }}.spdx.json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: chrono-synth-os-sbom-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 90

  # DAST baseline scan (P0.1 EP-1.1.c).
  #
  # Strategy: build the production image, run it locally on the runner,
  # let ZAP probe http://127.0.0.1:3000 with passive checks only — no
  # active attack payloads (use baseline, not full-scan).
  #
  # Why PR-to-main only (no push, no cron):
  #   - Adds ~2-3 min to PR feedback. Fine on PRs that touch backend
  #     surface; pointless on docs-only push events.
  #   - Cron coverage already comes from `secrets-scan` and `codeql`.
  #
  # Why ubuntu-latest (not CI_RUNNER_LABELS): docker/setup-buildx-action
  # and zaproxy/action-baseline both run via Docker; our self-hosted
  # macOS runner uses podman without a `docker` CLI shim. Same rationale
  # as the existing docker-build / secrets-scan jobs.
  #
  # Why fail_action: false (this PR): the first ZAP run will surface a
  # backlog of missing security headers (CSP, X-Frame-Options, HSTS).
  # Treating those as hard-fail today would block the very PR that
  # reveals them. The artifact is uploaded so we can read it, prioritise
  # fixes, then flip to fail_action: true in a follow-up PR once the
  # baseline is clean. See `docs/operations/security-ci-runbook.md`
  # → "DAST baseline" section.
  dast-baseline:
    name: DAST baseline (OWASP ZAP)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      # Build the production image on this job. The docker-build job in
      # ci.yml has already populated the GHA cache; this layer hits it.
      - name: Build chrono-synth-os image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: chrono-synth-os:dast-${{ github.sha }}
          cache-from: type=gha
          # Don't write to cache — let ci.yml's docker-build own that.
          cache-to: type=inline

      # Start the backend on the host network so ZAP (also docker) can
      # reach it on 127.0.0.1:3000 without bridging.
      #
      # CHRONO_QUEUE_ENABLED=true: in NODE_ENV=production the life-
      # simulations route refuses to start unless the async task queue
      # is on (CPU-pressure guardrail). TaskQueue itself only needs the
      # SQLite db, no Redis.
      - name: Start chrono-synth-os
        run: |
          docker run -d \
            --name chrono-os-dast \
            --network host \
            -e CHRONO_AUTH_ENABLED=false \
            -e CHRONO_QUEUE_ENABLED=true \
            -e CHRONO_DB_PATH=/app/data/chrono.db \
            -e NODE_ENV=production \
            chrono-synth-os:dast-${{ github.sha }}

      - name: Wait for /healthz
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/healthz >/dev/null 2>&1; then
              echo "backend up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "backend did not become healthy in 60s — container logs:"
          docker logs chrono-os-dast || true
          exit 1

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://127.0.0.1:3000'
          # `-I` = ignore info-level findings; `-T 10` = 10-min timeout.
          # Passive checks only — zap-baseline.py never sends active
          # attack payloads.
          cmd_options: '-I -T 10'
          # Don't auto-file a GitHub issue for findings. Triage happens
          # against the uploaded artifact instead. Default is `true`.
          allow_issue_writing: false
          # Don't fail the PR on findings yet. The first run will surface
          # missing security headers (CSP, X-Frame-Options, HSTS); we read
          # the report, fix critical alerts in a follow-up PR, then flip
          # this to true so future regressions hard-fail. Default is `false`.
          fail_action: false
          # Custom name to make the artifact discoverable per-SHA.
          artifact_name: zap-baseline-${{ github.sha }}

      - name: Capture backend log + cleanup
        if: always()
        run: |
          docker logs chrono-os-dast > zap-backend.log 2>&1 || true
          docker rm -f chrono-os-dast || true

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chrono-os-dast-backend-log-${{ github.sha }}
          path: zap-backend.log
          retention-days: 14
          if-no-files-found: warn
