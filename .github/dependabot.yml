version: 2
updates:
  # Root npm workspace
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    groups:
      types:
        patterns:
          - '@types/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
      fastify:
        patterns:
          - 'fastify'
          - '@fastify/*'
    ignore:
      # Pin TypeScript major manually; minor automated
      - dependency-name: typescript
        update-types: ['version-update:semver-major']

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: UTC
    labels:
      - dependencies
      - github-actions

  # Each kernel-style workspace independently
  - package-ecosystem: npm
    directory: /packages/kernel
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - kernel

  - package-ecosystem: npm
    directory: /packages/contracts
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - contracts

  - package-ecosystem: npm
    directory: /packages/adapter-web
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - adapter-web

  - package-ecosystem: npm
    directory: /packages/adapter-tauri
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - adapter-tauri

  - package-ecosystem: npm
    directory: /packages/adapter-react-native
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - adapter-react-native

  # Docker base image
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
