server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # 安全头
    # CSP enforce policy: 只对 script 严格收紧；style 因 Tailwind 生成 inline 样式仍需 unsafe-inline。
    # 注：'wasm-unsafe-eval' 是 Vite/某些库（如 protobuf）需要的；'unsafe-eval' 始终禁止。
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https: wss:; manifest-src 'self'; worker-src 'self'; media-src 'self'; child-src 'none'; frame-src 'none'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # CSP report-only：用于度量 Trusted Types 启用代价；上线观察 7 天后再合入主策略。
    # 没有 report-uri 是有意的——浏览器 DevTools 报告即可，避免依赖外部端点。
    add_header Content-Security-Policy-Report-Only "require-trusted-types-for 'script'; trusted-types default" always;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # COEP: 暂用 credentialless 而非 require-corp；后者会拒绝任何不带 CORP 头的子资源（含 Sentry CDN 上报）。
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(self), screen-wake-lock=(), sync-xhr=(), usb=(), xr-spatial-tracking=()" always;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 静态资源长缓存（Vite 会在文件名中加入 hash）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    location = /runtime-config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /frontend-healthz {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # SSE 长连接 — 必须显式 disable buffering 否则浏览器 EventSource
    # 拿不到增量 event，feature-flag kill-switch 体验会被 nginx 缓冲
    # 拖到 chunk flush 时点（数 KB 默认 buffer 大小，可能数十秒延迟）。
    # /events/stream 是历史路径，/feature-flags/stream 是 §8 Step 10 新增；
    # 两者用同一组 SSE-friendly 反代设置。
    location ~ ^/api/v1/(events|feature-flags)/stream$ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_http_version 1.1;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # WebSocket 反向代理
    location /ws {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 健康检查端点代理
    location /healthz {
        proxy_pass http://backend:3000;
    }

    location /readyz {
        proxy_pass http://backend:3000;
    }

    # /.well-known/* 代理到 backend（RFC 5785 well-known URI）。
    # 主要用例：/.well-known/jwks.json（§8 JWT 热轮换的公钥发布）。
    # 不加这条 location，请求会落到 SPA fallback 返回 index.html，外部
    # JWKS 消费者（其它服务、CI 验签、cosign verify-attestation 等）
    # 拿不到真 JWKS。
    location /.well-known/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /worker/ {
        proxy_pass http://observability-worker:3100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /prometheus/ {
        proxy_pass http://prometheus:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /prometheus;
    }

    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /grafana;
    }

    # SPA 路由 — 所有未匹配的路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
