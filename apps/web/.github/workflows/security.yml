name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 0'

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 不上传 GitHub Code Scanning（仓库未启用 Advanced Security）。
    # SARIF 仅作为 artifact 保留，开发者可在 Actions 页下载查看。
    # 若未来开启 Advanced Security，把 upload 改回 true 即可。
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
          config: |
            paths-ignore:
              - dist
              - playwright-report
              - test-results
              - '**/*.test.ts'
              - '**/*.test.tsx'
      - uses: github/codeql-action/analyze@v4
        id: analyze
        with:
          category: '/language:javascript-typescript'
          # 关闭 SARIF Code Scanning 上传：仓库未购买 Advanced Security
          upload: never
          # SARIF 输出目录；后续 upload-artifact 步骤打包成工件
          output: sarif-results
          # 同时关闭 CodeQL database 上传。这一步独立于 SARIF；没有 GHAS
          # 的仓库会触发 4 次重试后报 warning，污染日志。
          upload-database: false
      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codeql-sarif-${{ github.sha }}
          path: sarif-results/
          retention-days: 30
          if-no-files-found: error

  # Pinned to GitHub-hosted Ubuntu: trufflesecurity/trufflehog@main runs
  # via `docker run`, and our macOS self-hosted runner uses podman without
  # a `docker` CLI shim. Could be unblocked by installing `docker` CLI to
  # alias podman, but trufflehog is light enough (~10s) that it's not worth
  # the maintenance cost.
  secrets-scan:
    name: Secrets scan (trufflehog)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: TruffleHog filesystem scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown

  license-check:
    name: Dependency license allowlist
    runs-on: ${{ vars.CI_RUNNER_LABELS && fromJSON(vars.CI_RUNNER_LABELS) || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts
      - name: Run allowlist check
        run: |
          npx --yes license-checker-rseidelsohn@^4 \
            --production \
            --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense;MPL-2.0;Python-2.0;BlueOak-1.0.0;CC-BY-4.0;CC-BY-3.0' \
            --excludePackages 'chrono-synth-web@2.0.0' \
            --summary

  sbom:
    name: SBOM (SPDX)
    runs-on: ${{ vars.CI_RUNNER_LABELS && fromJSON(vars.CI_RUNNER_LABELS) || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts
      - uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: chrono-synth-web-sbom-${{ github.sha }}.spdx.json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: chrono-synth-web-sbom-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 90

  # DAST baseline scan (P0.1 EP-1.1.c).
  #
  # Strategy: build the production image, run nginx locally on the runner,
  # let ZAP probe http://127.0.0.1:8080 with passive checks only — no
  # active attack payloads (use baseline, not full-scan).
  #
  # What ZAP actually sees on a SPA:
  #   - / → index.html (response headers, CSP, COOP/COEP, X-Frame-Options)
  #   - /assets/*.js, *.css (cache-control, integrity)
  #   - /runtime-config.js (rendered by docker-entrypoint.sh — must contain
  #     no server-side secrets; see "DAST baseline" runbook section).
  #   - /frontend-healthz (always 200, no body)
  #
  # Why PR-to-main only (no push, no cron):
  #   - Adds ~2-3 min to PR feedback. Worth it on PRs that touch the
  #     frontend; pointless on docs-only push events.
  #   - Cron coverage already comes from `secrets-scan` and `codeql`.
  #
  # Why ubuntu-latest (not CI_RUNNER_LABELS): docker/setup-buildx-action
  # and zaproxy/action-baseline both run via Docker; our self-hosted
  # macOS runner uses podman without a `docker` CLI shim. Same rationale
  # as the existing docker-build / secrets-scan jobs.
  #
  # Why fail_action: false (this PR): first runs may surface header gaps
  # in nginx.conf. Treating those as hard-fail today would block the PR
  # that reveals them. Artifact is uploaded so we read the report,
  # prioritise fixes, then flip to fail_action: true in a follow-up PR.
  # See `docs/operations/security-ci-runbook.md` → "DAST baseline".
  dast-baseline:
    name: DAST baseline (OWASP ZAP)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      # Build the production image. The docker-build job in ci.yml has
      # already populated the GHA cache; this layer hits it.
      - name: Build chrono-synth-web image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: chrono-synth-web:dast-${{ github.sha }}
          cache-from: type=gha
          # Don't write to cache — let ci.yml's docker-build own that.
          cache-to: type=inline

      # Start nginx on the host network so ZAP (also docker) can reach it
      # on 127.0.0.1:8080 without bridging. No env injection: we want ZAP
      # to see the same `runtime-config.js` shape that prod/staging serves
      # before any operator override (apiBaseUrl="" / sentryDsn="" /
      # environment="production").
      #
      # `--add-host` overrides are required because nginx.conf references
      # four upstream hostnames (backend, observability-worker, prometheus,
      # grafana) for /api/ /ws /healthz /worker/ /prometheus/ /grafana/
      # routes. In real deployments these resolve via docker-compose / k8s
      # DNS. The DAST job runs nginx alone, so without these overrides
      # nginx fails to start with "host not found in upstream '<name>'".
      # Pointing the names at loopback satisfies the startup DNS check;
      # ZAP's passive scan probes static assets (`/`, `/assets/*`,
      # `/runtime-config.js`, `/frontend-healthz`) and won't traverse the
      # proxied paths in baseline mode, so the dummy resolution is
      # invisible to the scan output.
      - name: Start chrono-synth-web (nginx)
        run: |
          docker run -d \
            --name chrono-web-dast \
            --network host \
            --add-host=backend:127.0.0.1 \
            --add-host=observability-worker:127.0.0.1 \
            --add-host=prometheus:127.0.0.1 \
            --add-host=grafana:127.0.0.1 \
            chrono-synth-web:dast-${{ github.sha }}

      - name: Wait for /frontend-healthz
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/frontend-healthz >/dev/null 2>&1; then
              echo "nginx up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "nginx did not become healthy in 30s — container logs:"
          docker logs chrono-web-dast || true
          exit 1

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://127.0.0.1:8080'
          # `-I` = ignore info-level findings; `-T 10` = 10-min timeout.
          # Passive checks only — zap-baseline.py never sends active
          # attack payloads.
          cmd_options: '-I -T 10'
          # Don't auto-file a GitHub issue for findings. Triage happens
          # against the uploaded artifact instead. Default is `true`.
          allow_issue_writing: false
          # Don't fail the PR on findings yet. Flip this to `true` in a
          # follow-up PR once the first run is read and any gaps in
          # nginx.conf headers are addressed. Default is `false`.
          fail_action: false
          # Custom name to make the artifact discoverable per-SHA.
          artifact_name: zap-baseline-${{ github.sha }}

      - name: Capture nginx log + cleanup
        if: always()
        run: |
          docker logs chrono-web-dast > zap-nginx.log 2>&1 || true
          docker rm -f chrono-web-dast || true

      - name: Upload nginx log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chrono-web-dast-nginx-log-${{ github.sha }}
          path: zap-nginx.log
          retention-days: 14
          if-no-files-found: warn
