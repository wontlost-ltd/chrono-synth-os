# DEPRECATED: use chrono-synth-deploy/k8s/ instead
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chrono-synth-os
  namespace: chrono-synth
  labels:
    app.kubernetes.io/name: chrono-synth-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chrono-synth-os
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
