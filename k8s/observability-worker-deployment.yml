# DEPRECATED: use chrono-synth-deploy/k8s/ instead
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chrono-synth-observability-worker
  namespace: chrono-synth
  labels:
    app.kubernetes.io/name: chrono-synth-observability-worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chrono-synth-observability-worker
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3100"
        prometheus.io/path: "/metrics/prometheus"
      labels:
        app.kubernetes.io/name: chrono-synth-observability-worker
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: chrono-synth-observability-worker
          image: chrono-synth-os:latest
          command: ["node", "dist/main-observability-worker.js"]
          ports:
            - name: monitor
              containerPort: 3100
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            - name: CHRONO_OBSERVABILITY_WORKER_ENABLED
              value: "true"
            - name: CHRONO_OBSERVABILITY_WORKER_HTTP_ENABLED
              value: "true"
            - name: CHRONO_OBSERVABILITY_WORKER_HTTP_PORT
              value: "3100"
          envFrom:
            - configMapRef:
                name: chrono-synth-config
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chrono-synth-data
        - name: tmp
          emptyDir: {}
