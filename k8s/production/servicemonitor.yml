apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chrono-synth-os
  namespace: chrono-synth-prod
  labels:
    app.kubernetes.io/name: chrono-synth-os
    environment: production
spec:
  namespaceSelector:
    matchNames:
      - chrono-synth-prod
  selector:
    matchLabels:
      app.kubernetes.io/name: chrono-synth-os
  endpoints:
    - port: http
      path: /metrics/prometheus
      interval: 30s
      scrapeTimeout: 10s
      bearerTokenSecret:
        name: chrono-synth-prod-secrets
        key: PROMETHEUS_SCRAPE_BEARER_TOKEN
