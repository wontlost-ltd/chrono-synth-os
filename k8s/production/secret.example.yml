apiVersion: v1
kind: Secret
metadata:
  name: chrono-synth-prod-secrets
  namespace: chrono-synth-prod
  labels:
    app.kubernetes.io/name: chrono-synth-os
    environment: production
type: Opaque
stringData:
  CHRONO_DB_CONNECTION_STRING: "postgres://chrono_user:replace-password@postgres.example.internal:5432/chrono_synth"
  CHRONO_REDIS_URL: "redis://redis.example.internal:6379"
  CHRONO_JWT_SECRET: "replace-with-a-long-random-jwt-secret"
  CHRONO_ENCRYPTION_MASTER_KEY: "replace-with-32-byte-base64-master-key"
  CHRONO_AUTH_METRICS_API_KEYS: "replace-with-long-random-prometheus-scrape-key"
  PROMETHEUS_SCRAPE_BEARER_TOKEN: "replace-with-long-random-prometheus-scrape-key"
  CHRONO_OBSERVABILITY_KAFKA_USERNAME: "replace-kafka-username"
  CHRONO_OBSERVABILITY_KAFKA_PASSWORD: "replace-kafka-password"
