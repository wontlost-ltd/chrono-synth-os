apiVersion: v1
kind: ConfigMap
metadata:
  name: chrono-synth-prod-config
  namespace: chrono-synth-prod
  labels:
    app.kubernetes.io/name: chrono-synth-os
    environment: production
data:
  CHRONO_DB_DRIVER: "postgres"
  CHRONO_LOG_LEVEL: "info"
  CHRONO_LOG_JSON: "true"
  CHRONO_SERVER_HOST: "0.0.0.0"
  CHRONO_SERVER_PORT: "3000"
  CHRONO_SERVER_PUBLIC_URL: "https://api.chrono-synth.example.com"
  CHRONO_RATE_LIMIT_MAX: "300"
  CHRONO_RATE_LIMIT_WINDOW_MS: "60000"
  CHRONO_WEBSOCKET_ENABLED: "true"
  CHRONO_WEBSOCKET_HEARTBEAT_MS: "30000"
  CHRONO_CORS_ORIGIN: "https://app.chrono-synth.example.com"
  CHRONO_CORS_CREDENTIALS: "true"
  CHRONO_AUTH_ENABLED: "true"
  CHRONO_AUTH_REQUIRE_DB_KEYS: "true"
  CHRONO_JWT_ENABLED: "true"
  CHRONO_JWT_ISSUER: "chrono-synth-os"
  CHRONO_REQUEST_TIMEOUT_MS: "30000"
  CHRONO_REQUEST_MAX_BODY_BYTES: "1048576"
  CHRONO_REDIS_ENABLED: "true"
  CHRONO_REDIS_KEY_PREFIX: "chrono:prod:"
  CHRONO_ENCRYPTION_ENABLED: "true"
  CHRONO_ENCRYPTION_DEFAULT_KEY_REF: "master"
  CHRONO_ENCRYPTION_KEY_ROTATION_DAYS: "90"
  CHRONO_OBSERVABILITY_KAFKA_ENABLED: "true"
  CHRONO_OBSERVABILITY_KAFKA_BROKERS: "redpanda.kafka.svc.cluster.local:9092"
  CHRONO_OBSERVABILITY_KAFKA_CLIENT_ID: "chrono-synth-api"
  CHRONO_OBSERVABILITY_KAFKA_TOPIC: "observability.events"
  CHRONO_OBSERVABILITY_KAFKA_CONSUMER_GROUP_ID: "chrono-synth-prod-observability"
  CHRONO_OBSERVABILITY_KAFKA_STARTUP_WAIT_MS: "30000"
