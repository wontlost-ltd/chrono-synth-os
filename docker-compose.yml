services:
  backend:
    build:
      context: .
      args:
        - VERSION=${VERSION:-latest}
    ports:
      - "3000:3000"
    environment:
      - CHRONO_DB_DRIVER=postgres
      - CHRONO_DB_CONNECTION_STRING=postgresql://chrono:chrono@postgres:5432/chrono_synth
      - CHRONO_LOG_LEVEL=info
      - CHRONO_LOG_JSON=true
      - CHRONO_SERVER_HOST=0.0.0.0
      - CHRONO_SERVER_PORT=3000
      - CHRONO_CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - CHRONO_CORS_CREDENTIALS=true
      - CHRONO_AUTH_ENABLED=false
      - CHRONO_JWT_ENABLED=${JWT_ENABLED:-true}
      - CHRONO_JWT_SECRET=${JWT_SECRET:-supersecretjwtkey-for-local-dev-only}
      - CHRONO_REDIS_ENABLED=true
      - CHRONO_REDIS_URL=redis://redis:6379
      - CHRONO_STRIPE_ENABLED=${STRIPE_ENABLED:-false}
      - CHRONO_STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - CHRONO_STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - CHRONO_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - CHRONO_QUEUE_ENABLED=true
      - CHRONO_OTEL_ENABLED=${OTEL_ENABLED:-false}
      - CHRONO_OTEL_ENDPOINT=http://jaeger:4318
      - CHRONO_OBSERVABILITY_WORKER_ENABLED=false
      - CHRONO_OBSERVABILITY_WORKER_POLL_INTERVAL_MS=${OBS_WORKER_POLL_INTERVAL_MS:-1000}
      - CHRONO_OBSERVABILITY_WORKER_BATCH_SIZE=${OBS_WORKER_BATCH_SIZE:-100}
      - CHRONO_OBSERVABILITY_WORKER_MAX_ATTEMPTS=${OBS_WORKER_MAX_ATTEMPTS:-5}
      - CHRONO_OBSERVABILITY_KAFKA_ENABLED=${OBS_KAFKA_ENABLED:-false}
      - CHRONO_OBSERVABILITY_KAFKA_BROKERS=${OBS_KAFKA_BROKERS:-redpanda:9092}
      - CHRONO_OBSERVABILITY_KAFKA_CLIENT_ID=${OBS_KAFKA_CLIENT_ID:-chrono-synth-os}
      - CHRONO_OBSERVABILITY_KAFKA_TOPIC=${OBS_KAFKA_TOPIC:-observability.events}
      - CHRONO_OBSERVABILITY_KAFKA_CONSUMER_GROUP_ID=${OBS_KAFKA_GROUP_ID:-chrono-synth-observability}
      - CHRONO_OBSERVABILITY_KAFKA_STARTUP_WAIT_MS=${OBS_KAFKA_STARTUP_WAIT_MS:-30000}
      - CHRONO_OBSERVABILITY_KAFKA_SSL=${OBS_KAFKA_SSL:-false}
      - CHRONO_OBSERVABILITY_KAFKA_SASL_MECHANISM=${OBS_KAFKA_SASL_MECHANISM:-}
      - CHRONO_OBSERVABILITY_KAFKA_USERNAME=${OBS_KAFKA_USERNAME:-}
      - CHRONO_OBSERVABILITY_KAFKA_PASSWORD=${OBS_KAFKA_PASSWORD:-}
      - CHRONO_INTELLIGENCE_PROVIDER=rightcode
      - CHRONO_INTELLIGENCE_MODEL=gpt-5.2
      - CHRONO_INTELLIGENCE_API_KEY=${INTELLIGENCE_API_KEY:-}
      - CHRONO_INTELLIGENCE_BASE_URL=https://right.codes/codex
      - CHRONO_INTELLIGENCE_EMBEDDING_MODEL=text-embedding-3-small
    volumes:
      - chrono-data:/app/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - chrono-net

  frontend:
    build:
      # web 已融合进本仓 apps/web（ADR-0049）；默认 build context 指向它，不再是归档 sibling 仓。
      context: ${FRONTEND_PATH:-./apps/web}
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - chrono-net

  observability-worker:
    build:
      context: .
      args:
        - VERSION=${VERSION:-latest}
    command: ["node", "dist/main-observability-worker.js"]
    ports:
      - "${OBS_WORKER_HTTP_PORT:-3100}:${OBS_WORKER_HTTP_PORT:-3100}"
    environment:
      - CHRONO_DB_DRIVER=postgres
      - CHRONO_DB_CONNECTION_STRING=postgresql://chrono:chrono@postgres:5432/chrono_synth
      - CHRONO_LOG_LEVEL=info
      - CHRONO_LOG_JSON=true
      - CHRONO_REDIS_ENABLED=false
      - CHRONO_OBSERVABILITY_WORKER_ENABLED=true
      - CHRONO_OBSERVABILITY_WORKER_POLL_INTERVAL_MS=${OBS_WORKER_POLL_INTERVAL_MS:-1000}
      - CHRONO_OBSERVABILITY_WORKER_BATCH_SIZE=${OBS_WORKER_BATCH_SIZE:-100}
      - CHRONO_OBSERVABILITY_WORKER_MAX_ATTEMPTS=${OBS_WORKER_MAX_ATTEMPTS:-5}
      - CHRONO_OBSERVABILITY_WORKER_HTTP_ENABLED=true
      - CHRONO_OBSERVABILITY_WORKER_HTTP_HOST=0.0.0.0
      - CHRONO_OBSERVABILITY_WORKER_HTTP_PORT=${OBS_WORKER_HTTP_PORT:-3100}
      - CHRONO_OBSERVABILITY_KAFKA_ENABLED=${OBS_KAFKA_ENABLED:-false}
      - CHRONO_OBSERVABILITY_KAFKA_BROKERS=${OBS_KAFKA_BROKERS:-redpanda:9092}
      - CHRONO_OBSERVABILITY_KAFKA_CLIENT_ID=${OBS_KAFKA_CLIENT_ID:-chrono-synth-os}
      - CHRONO_OBSERVABILITY_KAFKA_TOPIC=${OBS_KAFKA_TOPIC:-observability.events}
      - CHRONO_OBSERVABILITY_KAFKA_CONSUMER_GROUP_ID=${OBS_KAFKA_GROUP_ID:-chrono-synth-observability}
      - CHRONO_OBSERVABILITY_KAFKA_STARTUP_WAIT_MS=${OBS_KAFKA_STARTUP_WAIT_MS:-30000}
      - CHRONO_OBSERVABILITY_KAFKA_SSL=${OBS_KAFKA_SSL:-false}
      - CHRONO_OBSERVABILITY_KAFKA_SASL_MECHANISM=${OBS_KAFKA_SASL_MECHANISM:-}
      - CHRONO_OBSERVABILITY_KAFKA_USERNAME=${OBS_KAFKA_USERNAME:-}
      - CHRONO_OBSERVABILITY_KAFKA_PASSWORD=${OBS_KAFKA_PASSWORD:-}
      - CHRONO_OTEL_ENABLED=${OTEL_ENABLED:-false}
      - CHRONO_OTEL_ENDPOINT=http://jaeger:4318
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${OBS_WORKER_HTTP_PORT:-3100}/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - chrono-net

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: chrono_synth
      POSTGRES_USER: chrono
      POSTGRES_PASSWORD: chrono
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chrono -d chrono_synth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chrono-net

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14269/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - chrono-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - chrono-net

  redpanda:
    image: redpandadata/redpanda:v24.3.6
    profiles: ["kafka"]
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=redpanda:8082
    ports:
      - "9092:9092"
      - "8082:8082"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - chrono-net

  kafka-native:
    image: apache/kafka-native:4.2.0
    profiles: ["kafka-native"]
    hostname: kafka-native
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-native:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-native:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
    ports:
      - "9092:9092"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/9092'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - chrono-net

volumes:
  chrono-data:
    driver: local
  pg-data:
    driver: local
  redis-data:
    driver: local

networks:
  chrono-net:
    driver: bridge
