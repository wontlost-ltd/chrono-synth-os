version: "3.9"

services:
  chrono-synth-os:
    build: .
    ports:
      - "3000:3000"
    environment:
      - CHRONO_DB_PATH=/app/data/chrono.db
      - CHRONO_LOG_LEVEL=info
      - CHRONO_LOG_JSON=true
      - CHRONO_SERVER_HOST=0.0.0.0
      - CHRONO_SERVER_PORT=3000
      - CHRONO_CORS_ORIGIN=false
      - CHRONO_AUTH_ENABLED=false
    volumes:
      - chrono-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  chrono-data:
    driver: local
